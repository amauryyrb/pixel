@import url('https://fonts.googleapis.com/css2?family=Jost:ital,wght@0,100..900;1,100..900&display=swap');

    body {
      font-family: 'Jost', sans-serif;
      background: #F5F5F5;
      margin: 0;
      padding: 10px 20px;
      overflow-x: hidden;
    }

    h1 {
      text-align: center;
      font-size: 2.7rem;
      margin-bottom: 40px;
      color: #111;
    }

    h3 {
      margin-top: 20px;
      color: #333;
      border-left: 4px solid #0077ff;
      padding-left: 10px;
      font-size: 1.8rem;
    }

     h4 {
      margin-top: 20px;
      color: #333;
      border-left: 2px solid #0077ff;
      padding-left: 10px;
      font-size: 1rem;
    }

    .section {
      background: white;
      border-radius: 18px;
      box-shadow: 0 5px 10px rgba(0, 0, 0, 0.1);
      padding: 25px 30px;
      margin: 25px auto;
      max-width: 1200px;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .section:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 28px rgba(0, 0, 0, 0.15);
    }


    ul {
    list-style: none;
    padding-left: 0;
    margin: 10px 0;

    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px 30px;
    }

    ul-1 {
    list-style: none;
    padding-left: 0;
    margin: 10px 0;

    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px 30px;
    }

    /*ne se voit pas*/

    


    li {
      margin-bottom: 1px;
      font-size: 1.2rem;
      display: flex;
      align-items: center;
    }

    li::before {
      content: "-";
      color: #4682B4;
      font-weight: bold;
      margin-right: 8px;
    }

    a {
      text-decoration: none;
      color: #4682B4;
      font-weight: 500;
      position: relative;
      transition: color 0.2s ease;
    }

    a::after {
      content: "";
      position: absolute;
      width: 0;
      height: 2px;
      bottom: -2px;
      left: 0;
      background-color: #191970;
      transition: width 0.3s;
    }

    a:hover::after {
      width: 100%;
    }

    a:hover {
      color: #191970;
    }

    footer {
      text-align: center;
      margin-top: 60px;
      font-size: 0.9rem;
      color: #777;
    }
  </style>
</head>
